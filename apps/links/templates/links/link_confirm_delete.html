{% extends "base.html" %}

{% block title %}Excluir link{% endblock title %}

{% block content %}
    <div class="min-h-screen bg-gray-50 flex items-center justify-center p-6">
        <div class="w-full max-w-md bg-white rounded-xl shadow-md p-8 text-center">
            <h1 class="text-2xl font-bold text-gray-800 mb-2">Excluir link</h1>
            <p class="text-gray-500 mb-6">
                Tem certeza que deseja excluir <strong>{{ object.title }}</strong>?
                Esta ação não pode ser desfeita.
            </p>

            <form method="post" class="flex gap-3 justify-center">
                {% csrf_token %}
                <button type="submit" class="px-4 py-2 text-sm font-medium text-white bg-red-600 rounded-lg hover:bg-red-700">
                    Excluir
                </button>
                <a href="{% url 'links:manage' %}" class="px-4 py-2 text-sm font-medium text-gray-700 bg-gray-100 rounded-lg hover:bg-gray-200">
                    Cancelar
                </a>
            </form>
        </div>
    </div>
{% endblock content %}
